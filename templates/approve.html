<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Deploy Approval</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 1.5rem; max-width: 480px; margin: 0 auto; }
  h2 { margin-bottom: 1.5rem; font-size: 1.25rem; color: #fff; }
  dl { margin-bottom: 1.5rem; }
  dt { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin-top: 0.75rem; }
  dd { font-size: 1rem; color: #e0e0e0; margin-top: 0.25rem; word-break: break-all; }
  .summary { white-space: pre-wrap; }
  form { display: flex; gap: 1rem; margin-top: 1.5rem; }
  button { flex: 1; padding: 0.875rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
  .approve { background: #22c55e; color: #000; }
  .approve:active { background: #16a34a; }
  .deny { background: #333; color: #e0e0e0; }
  .deny:active { background: #444; }
</style>
</head>
<body>
  <h2>Deploy Approval</h2>
  <dl>
    <dt>Service</dt><dd>{{.Approval.Service}}</dd>
    <dt>Commit</dt><dd>{{.Approval.Commit}}</dd>
    <dt>Branch</dt><dd>{{.Approval.Branch}}</dd>
    <dt>Agent</dt><dd>{{.Approval.Agent}}</dd>
    <dt>Summary</dt><dd class="summary">{{.Approval.Summary}}</dd>
  </dl>
  <form method="POST">
    <input type="hidden" name="token" value="{{.Token}}">
    <button type="submit" name="action" value="approve" class="approve">Approve</button>
    <button type="submit" name="action" value="deny" class="deny">Deny</button>
  </form>
</body>
</html>
